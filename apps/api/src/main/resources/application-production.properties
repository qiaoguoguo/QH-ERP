spring.config.import=configtree:/run/secrets/
spring.datasource.url=${QHERP_DATASOURCE_URL}
spring.datasource.username=${QHERP_DATASOURCE_USERNAME}
qherp.platform.approval.enforce-direct-actions=${QHERP_APPROVAL_ENFORCE_DIRECT_ACTIONS}
qherp.platform.task.worker.enabled=${QHERP_TASK_WORKER_ENABLED}
qherp.storage.s3.endpoint=${QHERP_S3_ENDPOINT}
qherp.storage.s3.region=${QHERP_S3_REGION}
qherp.storage.s3.bucket=${QHERP_S3_BUCKET}
qherp.storage.s3.path-style=${QHERP_S3_PATH_STYLE}

server.port=8080
server.forward-headers-strategy=framework
server.shutdown=graceful
server.servlet.session.timeout=30m
server.servlet.session.cookie.name=QHERPSESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${QHERP_SESSION_COOKIE_SECURE}
server.servlet.session.cookie.same-site=lax
server.error.include-message=never
server.error.include-stacktrace=never

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
spring.lifecycle.timeout-per-shutdown-phase=30s
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Shanghai
logging.file.name=/tmp/qherp-api.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=5
