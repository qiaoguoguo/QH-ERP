name: qherp035

x-service-defaults: &service-defaults
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

services:
  postgres:
    <<: *service-defaults
    image: postgres:18.4-alpine3.24@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    environment:
      POSTGRES_DB: ${QHERP_POSTGRES_DB:?缺少 QHERP_POSTGRES_DB}
      POSTGRES_USER: ${QHERP_POSTGRES_USER:?缺少 QHERP_POSTGRES_USER}
      POSTGRES_PASSWORD: ${QHERP_POSTGRES_PASSWORD:?缺少 QHERP_POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    mem_limit: 1g
    cpus: 1.5
    security_opt:
      - no-new-privileges:true
    networks:
      - qherp

  minio:
    <<: *service-defaults
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z@sha256:a1ea29fa28355559ef137d71fc570e508a214ec84ff8083e39bc5428980b015e
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${QHERP_MINIO_ROOT_USER:?缺少 QHERP_MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${QHERP_MINIO_ROOT_PASSWORD:?缺少 QHERP_MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    mem_limit: 512m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    networks:
      - qherp

  api:
    <<: *service-defaults
    image: qherp/api:${QHERP_IMAGE_TAG:?缺少 QHERP_IMAGE_TAG}
    build:
      context: ./apps/api
      args:
        QHERP_SOURCE_COMMIT: ${QHERP_SOURCE_COMMIT:?缺少 QHERP_SOURCE_COMMIT}
    environment:
      SPRING_PROFILES_ACTIVE: production
      QHERP_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${QHERP_POSTGRES_DB:?缺少 QHERP_POSTGRES_DB}
      QHERP_DATASOURCE_USERNAME: ${QHERP_POSTGRES_USER:?缺少 QHERP_POSTGRES_USER}
      QHERP_DATASOURCE_PASSWORD: ${QHERP_POSTGRES_PASSWORD:?缺少 QHERP_POSTGRES_PASSWORD}
      QHERP_INITIAL_ADMIN_PASSWORD: ${QHERP_INITIAL_ADMIN_PASSWORD:?缺少 QHERP_INITIAL_ADMIN_PASSWORD}
      QHERP_S3_ENDPOINT: http://minio:9000
      QHERP_S3_REGION: us-east-1
      QHERP_S3_BUCKET: ${QHERP_S3_BUCKET:?缺少 QHERP_S3_BUCKET}
      QHERP_S3_ACCESS_KEY: ${QHERP_MINIO_ROOT_USER:?缺少 QHERP_MINIO_ROOT_USER}
      QHERP_S3_SECRET_KEY: ${QHERP_MINIO_ROOT_PASSWORD:?缺少 QHERP_MINIO_ROOT_PASSWORD}
      QHERP_S3_PATH_STYLE: "true"
      QHERP_SESSION_COOKIE_SECURE: ${QHERP_SESSION_COOKIE_SECURE:?缺少 QHERP_SESSION_COOKIE_SECURE}
      QHERP_TASK_WORKER_ENABLED: "true"
      QHERP_APPROVAL_ENFORCE_DIRECT_ACTIONS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 60s
    mem_limit: 1g
    cpus: 2.0
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    security_opt:
      - no-new-privileges:true
    networks:
      - qherp

  web:
    <<: *service-defaults
    image: qherp/web:${QHERP_IMAGE_TAG:?缺少 QHERP_IMAGE_TAG}
    build:
      context: ./apps/web
      args:
        QHERP_SOURCE_COMMIT: ${QHERP_SOURCE_COMMIT:?缺少 QHERP_SOURCE_COMMIT}
    ports:
      - "127.0.0.1:45173:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && test -s /usr/share/nginx/html/index.html"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    mem_limit: 256m
    cpus: 0.5
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=32m,mode=0755
      - /var/run:size=8m,mode=0755
      - /tmp:size=8m,mode=1777
    security_opt:
      - no-new-privileges:true
    networks:
      - qherp

volumes:
  postgres-data:
  minio-data:

networks:
  qherp:
    driver: bridge
