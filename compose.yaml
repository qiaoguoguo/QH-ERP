services:
  postgres:
    image: postgres:18-alpine
    container_name: qherp-postgres
    environment:
      POSTGRES_DB: ${QHERP_POSTGRES_DB:-qherp}
      POSTGRES_USER: ${QHERP_POSTGRES_USER:-qherp}
      POSTGRES_PASSWORD: ${QHERP_POSTGRES_PASSWORD:-qherp_dev_password}
    ports:
      - "${QHERP_POSTGRES_PORT:-15432}:5432"
    volumes:
      - qherp-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${QHERP_POSTGRES_USER:-qherp} -d ${QHERP_POSTGRES_DB:-qherp}"]
      interval: 10s
      timeout: 5s
      retries: 5
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: qherp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${QHERP_MINIO_ROOT_USER:-qherpminio}
      MINIO_ROOT_PASSWORD: ${QHERP_MINIO_ROOT_PASSWORD:-qherpminio123}
    ports:
      - "${QHERP_MINIO_API_PORT:-19000}:9000"
      - "${QHERP_MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - qherp-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qherp-postgres-data:
  qherp-minio-data:
